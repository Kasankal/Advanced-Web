<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Book Management</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
  h1 { background: #8e44ad; color: white; padding: 15px 20px; border-radius: 6px; margin-bottom: 20px; }
  .container { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
  .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
  h2 { font-size: 16px; margin-bottom: 14px; color: #8e44ad; border-bottom: 2px solid #8e44ad; padding-bottom: 8px; }
  label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #555; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px; font-size: 14px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; }
  .toolbar input { margin: 0; flex: 1; }
  .toolbar select { margin: 0; width: 160px; }
  .btn { padding: 9px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .btn-primary { background: #8e44ad; color: white; width: 100%; }
  .btn-success { background: #27ae60; color: white; width: 100%; margin-top: 6px; }
  .btn-edit   { background: #f39c12; color: white; padding: 5px 10px; font-size: 12px; }
  .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; }
  .btn-search { background: #3498db; color: white; padding: 8px 14px; font-size: 13px; white-space: nowrap; }
  .btn:hover { opacity: .88; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #8e44ad; color: white; padding: 10px; text-align: left; }
  td { padding: 9px 10px; border-bottom: 1px solid #eee; }
  tr:hover td { background: #f9f9f9; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
  .badge-available { background: #d4edda; color: #155724; }
  .badge-unavailable { background: #f8d7da; color: #721c24; }
  .msg { padding: 10px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; display: none; }
  .msg.success { background: #d4edda; color: #155724; display: block; }
  .msg.error   { background: #f8d7da; color: #721c24; display: block; }
  #editSection { display: none; margin-top: 16px; }
</style>
</head>
<body>
<h1> Library Book Management System</h1>
<div class="container">
  <div>
    <div class="card">
      <h2>Add New Book</h2>
      <div id="msg" class="msg"></div>
      <label>Book ID</label>
      <input id="bookId" placeholder="e.g. LIB001">
      <label>Title</label>
      <input id="title" placeholder="Book Title">
      <label>Author</label>
      <input id="author" placeholder="Author Name">
      <label>Category</label>
      <select id="category">
        <option value="">-- Select --</option>
        <option>Fiction</option><option>Non-Fiction</option>
        <option>Science</option><option>Technology</option>
        <option>History</option><option>Biography</option>
        <option>Education</option><option>Other</option>
      </select>
      <label>ISBN (optional)</label>
      <input id="isbn" placeholder="978-...">
      <button class="btn btn-primary" onclick="addBook()"> Add Book</button>
    </div>

    <div class="card" id="editSection">
      <h2>Edit Book</h2>
      <input type="hidden" id="editId">
      <label>Title</label>
      <input id="eTitle">
      <label>Author</label>
      <input id="eAuthor">
      <label>Category</label>
      <select id="eCategory">
        <option>Fiction</option><option>Non-Fiction</option>
        <option>Science</option><option>Technology</option>
        <option>History</option><option>Biography</option>
        <option>Education</option><option>Other</option>
      </select>
      <label>ISBN</label>
      <input id="eIsbn">
      <label>Available</label>
      <select id="eAvailable">
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>
      <button class="btn btn-success" onclick="updateBook()"> Save Changes</button>
      <button class="btn btn-primary" onclick="cancelEdit()" style="margin-top:6px;background:#95a5a6;">Cancel</button>
    </div>
  </div>

  <div class="card">
    <h2>Book Catalog (<span id="count">0</span> books)</h2>
    <div class="toolbar">
      <input id="searchInput" placeholder="Search by title, author, or ID..." onkeyup="if(event.key==='Enter') searchBooks()">
      <select id="filterCat" onchange="searchBooks()">
        <option value="">All Categories</option>
        <option>Fiction</option><option>Non-Fiction</option>
        <option>Science</option><option>Technology</option>
        <option>History</option><option>Biography</option>
        <option>Education</option><option>Other</option>
      </select>
      <button class="btn btn-search" onclick="searchBooks()"></button>
    </div>
    <table>
      <thead><tr><th>Book ID</th><th>Title</th><th>Author</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="bookTable"></tbody>
    </table>
  </div>
</div>

<script>
const API = '/api/books';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  setTimeout(() => el.style.display = 'none', 3000);
}

async function loadBooks(search = '', category = '') {
  let url = API;
  const params = new URLSearchParams();
  if (search) params.append('search', search);
  if (category) params.append('category', category);
  if (params.toString()) url += '?' + params;
  const res = await fetch(url);
  const { data, count } = await res.json();
  document.getElementById('count').textContent = count;
  const tbody = document.getElementById('bookTable');
  tbody.innerHTML = data.map(b => `
    <tr>
      <td>${b.bookId}</td>
      <td><strong>${b.title}</strong></td>
      <td>${b.author}</td>
      <td>${b.category}</td>
      <td><span class="badge ${b.available ? 'badge-available' : 'badge-unavailable'}">${b.available ? 'Available' : 'Checked Out'}</span></td>
      <td>
        <button class="btn btn-edit" onclick="openEdit('${b._id}','${b.title.replace(/'/g,"\\'")}','${b.author}','${b.category}','${b.isbn||''}',${b.available})">✏️</button>
        <button class="btn btn-delete" onclick="deleteBook('${b._id}')">Delete</button>
      </td>
    </tr>`).join('');
}

function searchBooks() {
  loadBooks(document.getElementById('searchInput').value, document.getElementById('filterCat').value);
}

async function addBook() {
  const body = {
    bookId:   document.getElementById('bookId').value.trim(),
    title:    document.getElementById('title').value.trim(),
    author:   document.getElementById('author').value.trim(),
    category: document.getElementById('category').value,
    isbn:     document.getElementById('isbn').value.trim() || undefined
  };
  if (!body.bookId || !body.title || !body.author || !body.category)
    return showMsg('Fill all required fields.', 'error');
  const res = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();
  if (data.success) { showMsg('Book added!', 'success'); loadBooks(); }
  else showMsg(data.error, 'error');
}

function openEdit(id, title, author, category, isbn, available) {
  document.getElementById('editSection').style.display = 'block';
  document.getElementById('editId').value = id;
  document.getElementById('eTitle').value = title;
  document.getElementById('eAuthor').value = author;
  document.getElementById('eCategory').value = category;
  document.getElementById('eIsbn').value = isbn;
  document.getElementById('eAvailable').value = String(available);
  document.getElementById('editSection').scrollIntoView({behavior:'smooth'});
}

async function updateBook() {
  const id = document.getElementById('editId').value;
  const body = {
    title:     document.getElementById('eTitle').value.trim(),
    author:    document.getElementById('eAuthor').value.trim(),
    category:  document.getElementById('eCategory').value,
    isbn:      document.getElementById('eIsbn').value.trim(),
    available: document.getElementById('eAvailable').value === 'true'
  };
  const res = await fetch(`${API}/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();
  if (data.success) { showMsg('Book updated!', 'success'); cancelEdit(); loadBooks(); }
  else showMsg(data.error, 'error');
}

function cancelEdit() { document.getElementById('editSection').style.display = 'none'; }

async function deleteBook(id) {
  if (!confirm('Delete this book?')) return;
  const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) { showMsg('Book deleted.', 'success'); loadBooks(); }
  else showMsg(data.error, 'error');
}

loadBooks();
</script>
</body>
</html>
